name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- TypeScript / Next.js packages and app --------------------------------
  ts-lint-test:
    name: TS lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run lint
      - run: pnpm --filter "@lima/aura-dsl" test

  # ---- Go API service -------------------------------------------------------
  go-api:
    name: Go API lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache-dependency-path: services/api/go.sum
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - run: |
          "$(go env GOPATH)/bin/golangci-lint" run ./...
      - run: go test ./... -race -timeout 120s

  # ---- Go worker service ----------------------------------------------------
  go-worker:
    name: Go worker lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/worker
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache-dependency-path: services/worker/go.sum
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - run: |
          "$(go env GOPATH)/bin/golangci-lint" run ./...
      - run: go test ./... -race -timeout 120s

  # ---- Docker image builds (smoke) ------------------------------------------
  docker-build:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs: [ts-lint-test, go-api, go-worker]
    strategy:
      matrix:
        include:
          - context: services/api
            dockerfile: services/api/Dockerfile
            image: lima-api
          - context: services/worker
            dockerfile: services/worker/Dockerfile
            image: lima-worker
          - context: .
            dockerfile: apps/web/Dockerfile
            image: lima-web
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
