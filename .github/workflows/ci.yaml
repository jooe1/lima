name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- TypeScript / Next.js packages and app --------------------------------
  ts-lint-test:
    name: TS lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run lint
      - run: pnpm --filter "@lima/aura-dsl" test

  # ---- Go API service -------------------------------------------------------
  go-api:
    name: Go API lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: services/api/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/api
          version: latest
      - run: go test ./... -race -timeout 120s

  # ---- Go worker service ----------------------------------------------------
  go-worker:
    name: Go worker lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: services/worker/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/worker
          version: latest
      - run: go test ./... -race -timeout 120s

  # ---- Docker image builds (smoke) ------------------------------------------
  docker-build:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs: [ts-lint-test, go-api, go-worker]
    strategy:
      matrix:
        include:
          - context: services/api
            image: lima-api
          - context: services/worker
            image: lima-worker
          - context: apps/web
            image: lima-web
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
