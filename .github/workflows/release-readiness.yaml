name: Release Readiness

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  helm-validation:
    name: Helm lint and template
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | DESIRED_VERSION=v3.17.3 bash
          helm version --short
      - name: Build chart dependencies
        run: helm dependency build deploy/helm/lima
      - name: Helm lint
        run: |
          helm lint deploy/helm/lima \
            -f deploy/helm/lima/ci-values.yaml \
            -f deploy/helm/lima/ci-smoke-values.yaml \
            --set-string images.api.repository=lima/api \
            --set-string images.api.tag=ci-test \
            --set-string images.api.pullPolicy=IfNotPresent \
            --set-string images.worker.repository=lima/worker \
            --set-string images.worker.tag=ci-test \
            --set-string images.worker.pullPolicy=IfNotPresent \
            --set-string images.web.repository=lima/web \
            --set-string images.web.tag=ci-test \
            --set-string images.web.pullPolicy=IfNotPresent
      - name: Helm template
        run: |
          helm template lima deploy/helm/lima \
            --namespace lima \
            -f deploy/helm/lima/ci-values.yaml \
            -f deploy/helm/lima/ci-smoke-values.yaml \
            --set-string images.api.repository=lima/api \
            --set-string images.api.tag=ci-test \
            --set-string images.api.pullPolicy=IfNotPresent \
            --set-string images.worker.repository=lima/worker \
            --set-string images.worker.tag=ci-test \
            --set-string images.worker.pullPolicy=IfNotPresent \
            --set-string images.web.repository=lima/web \
            --set-string images.web.tag=ci-test \
            --set-string images.web.pullPolicy=IfNotPresent > /tmp/lima-helm-render.yaml
          test -s /tmp/lima-helm-render.yaml

  helm-install-smoke:
    name: Helm install smoke
    runs-on: ubuntu-latest
    needs: [helm-validation]
    timeout-minutes: 35
    env:
      HELM_RELEASE: lima
      HELM_NAMESPACE: lima-smoke
      KIND_CLUSTER_NAME: lima-smoke
      IMAGE_TAG: ci-${{ github.sha }}
    steps:
      - uses: actions/checkout@v5
      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | DESIRED_VERSION=v3.17.3 bash
          helm version --short
      - uses: docker/setup-buildx-action@v4
      - uses: helm/kind-action@v1.14.0
        with:
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          wait: 120s
      - name: Build API image
        uses: docker/build-push-action@v7
        with:
          context: services/api
          load: true
          tags: lima/api:${{ env.IMAGE_TAG }}
      - name: Build worker image
        uses: docker/build-push-action@v7
        with:
          context: services/worker
          load: true
          tags: lima/worker:${{ env.IMAGE_TAG }}
      - name: Build web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          load: true
          tags: lima/web:${{ env.IMAGE_TAG }}
      - name: Load images into kind
        run: |
          kind load docker-image --name "$KIND_CLUSTER_NAME" \
            "lima/api:${IMAGE_TAG}" \
            "lima/worker:${IMAGE_TAG}" \
            "lima/web:${IMAGE_TAG}"
      - name: Build chart dependencies
        run: helm dependency build deploy/helm/lima
      - name: Helm install smoke
        run: |
          helm install "$HELM_RELEASE" deploy/helm/lima \
            --namespace "$HELM_NAMESPACE" \
            --create-namespace \
            --wait \
            --wait-for-jobs \
            --timeout 10m \
            -f deploy/helm/lima/ci-values.yaml \
            -f deploy/helm/lima/ci-smoke-values.yaml \
            --set-string images.api.repository=lima/api \
            --set-string images.api.tag="$IMAGE_TAG" \
            --set-string images.api.pullPolicy=IfNotPresent \
            --set-string images.worker.repository=lima/worker \
            --set-string images.worker.tag="$IMAGE_TAG" \
            --set-string images.worker.pullPolicy=IfNotPresent \
            --set-string images.web.repository=lima/web \
            --set-string images.web.tag="$IMAGE_TAG" \
            --set-string images.web.pullPolicy=IfNotPresent
      - name: Verify cluster rollout and API health
        run: |
          kubectl rollout status deployment/lima-api -n "$HELM_NAMESPACE" --timeout=5m
          kubectl rollout status deployment/lima-worker -n "$HELM_NAMESPACE" --timeout=5m
          kubectl rollout status deployment/lima-web -n "$HELM_NAMESPACE" --timeout=5m
          kubectl get deploy,statefulset,pods,svc -n "$HELM_NAMESPACE"
          kubectl port-forward -n "$HELM_NAMESPACE" svc/lima-api 18080:8080 >/tmp/lima-api-port-forward.log 2>&1 &
          PF_PID=$!
          trap 'kill "$PF_PID" >/dev/null 2>&1 || true' EXIT
          sleep 2
          curl --fail --retry 10 --retry-delay 2 --retry-connrefused http://127.0.0.1:18080/healthz
      - name: Dump cluster diagnostics on failure
        if: failure()
        run: |
          helm status "$HELM_RELEASE" -n "$HELM_NAMESPACE" || true
          kubectl get all -A || true
          kubectl get events -n "$HELM_NAMESPACE" --sort-by=.metadata.creationTimestamp || true
          kubectl describe pods -n "$HELM_NAMESPACE" || true
          MIGRATE_JOB="$(kubectl get jobs -n "$HELM_NAMESPACE" -l app.kubernetes.io/instance="$HELM_RELEASE" -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep "^${HELM_RELEASE}-migrate-r" | tail -n 1)"
          if [ -n "$MIGRATE_JOB" ]; then
            kubectl logs -n "$HELM_NAMESPACE" "job/$MIGRATE_JOB" || true
          fi
          kubectl get pods -n "$HELM_NAMESPACE" -l app.kubernetes.io/name=postgresql || true
          kubectl describe pods -n "$HELM_NAMESPACE" -l app.kubernetes.io/name=postgresql || true
          kubectl logs -n "$HELM_NAMESPACE" -l app.kubernetes.io/name=postgresql --all-containers=true --tail=200 || true
          kubectl get pods -n "$HELM_NAMESPACE" -l app.kubernetes.io/name=redis || true
          kubectl describe pods -n "$HELM_NAMESPACE" -l app.kubernetes.io/name=redis || true
          kubectl logs -n "$HELM_NAMESPACE" -l app.kubernetes.io/name=redis --all-containers=true --tail=200 || true
          kubectl logs -n "$HELM_NAMESPACE" deployment/lima-api --all-containers=true || true
          kubectl logs -n "$HELM_NAMESPACE" deployment/lima-worker --all-containers=true || true
          kubectl logs -n "$HELM_NAMESPACE" deployment/lima-web --all-containers=true || true

  compose-smoke:
    name: Compose smoke + backup restore
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Validate Compose config
        run: docker compose -f deploy/docker-compose/docker-compose.yml config > /tmp/lima-compose-config.yaml
      - name: Compose smoke validation
        env:
          COMPOSE_DOCKER_CLI_BUILD: "1"
          DOCKER_BUILDKIT: "1"
        run: bash deploy/docker-compose/ci-smoke.sh