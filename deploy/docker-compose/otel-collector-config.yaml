receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Scrape Prometheus metrics exposed by the services themselves (if metrics.enabled).
  prometheus:
    config:
      scrape_configs:
        - job_name: lima-api
          scrape_interval: 15s
          static_configs:
            - targets: ["api:8080"]
        - job_name: otel-collector
          scrape_interval: 15s
          static_configs:
            - targets: ["localhost:8888"]

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  # Drop high-cardinality debug spans in production.
  filter/drop_debug:
    error_mode: ignore
    traces:
      span:
        - 'attributes["http.target"] == "/healthz"'

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Expose scraped metrics for Prometheus to scrape.
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: lima

  # Debug exporter: prints a summary of each received batch (disable in prod).
  debug:
    verbosity: basic

service:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: "0.0.0.0"
                port: 8888

  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, filter/drop_debug]
      exporters: [otlp/jaeger]

    metrics:
      receivers: [otlp, prometheus]
      processors: [batch]
      exporters: [prometheus]

