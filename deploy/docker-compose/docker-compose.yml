networks:
  lima:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  prometheus_data:
  grafana_data:

services:
  # ---- Postgres 16 -----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lima
      POSTGRES_PASSWORD: lima_dev_secret
      POSTGRES_DB: lima
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5444:5432"
    networks: [lima]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lima"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---- Redis 7 ---------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    networks: [lima]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---- golang-migrate (runs once, then exits) --------------------------------
  migrate:
    image: migrate/migrate:v4.19.1
    command: >
      -path /migrations
      -database "postgres://lima:lima_dev_secret@postgres:5432/lima?sslmode=disable"
      up
    volumes:
      - ../../services/api/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [lima]

  # ---- API service (Go) ------------------------------------------------------
  api:
    build:
      context: ../../services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENV: development
      PORT: "8080"
      DATABASE_URL: postgres://lima:lima_dev_secret@postgres:5432/lima?sslmode=disable
      REDIS_URL: redis://redis:6379
      OTEL_ENDPOINT: http://otel-collector:4318
      JWT_SECRET: dev_jwt_secret_change_in_prod
      CREDENTIALS_ENCRYPTION_KEY: dev_credentials_key_change_in_prod
      CREDENTIALS_ENCRYPTION_KEY_PREVIOUS: dev_jwt_secret_change_in_prod
      ALLOW_ORIGINS: http://localhost:3000,http://localhost:3001
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks: [lima]

  # ---- Worker service (Go) ---------------------------------------------------
  worker:
    build:
      context: ../../services/worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENV: development
      DATABASE_URL: postgres://lima:lima_dev_secret@postgres:5432/lima?sslmode=disable
      REDIS_URL: redis://redis:6379
      OTEL_ENDPOINT: http://otel-collector:4318
      CREDENTIALS_ENCRYPTION_KEY: dev_credentials_key_change_in_prod
      CREDENTIALS_ENCRYPTION_KEY_PREVIOUS: dev_jwt_secret_change_in_prod
      # Optional: override the AI model used for the layout generation stage.
      # Defaults to the AI_MODEL value when not set.
      LAYOUT_MODEL: ${LAYOUT_MODEL:-}
      # Optional: override the AI model used for the flow/wiring generation stage.
      # Defaults to the AI_MODEL value when not set.
      FLOW_MODEL: ${FLOW_MODEL:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks: [lima]

  # ---- Next.js web app -------------------------------------------------------
  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_DEV_LOGIN: "true"
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:8080
      NEXT_PUBLIC_DEV_LOGIN: "true"
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks: [lima]

  # ---- OpenTelemetry Collector -----------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4318:4318" # OTLP HTTP
      - "4317:4317" # OTLP gRPC
    networks: [lima]

  # ---- Jaeger (local trace UI) -----------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    ports:
      - "16686:16686" # Jaeger UI
    networks: [lima]

  # ---- Prometheus (monitoring profile) ---------------------------------------
  # Start with: docker compose --profile monitoring up
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    profiles: [monitoring]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on: [otel-collector]
    networks: [lima]

  # ---- Grafana (monitoring profile) ------------------------------------------
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    profiles: [monitoring]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on: [prometheus]
    networks: [lima]
