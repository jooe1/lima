{{- if .Values.migration.enabled -}}
{{- $files := .Files.Glob "files/migrations/*.sql" }}
{{- if $files }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lima.fullname" . }}-migrations
  labels: {{ include "lima.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
binaryData:
  {{- range $path, $bytes := $files }}
  {{ base $path }}: {{ $bytes | b64enc | quote }}
  {{- end }}
{{- end }}
{{- end }}
